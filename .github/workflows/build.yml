# .github/workflows/build.yml
name: Build JowoTerm APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: 📱 Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
    
    - name: 🔧 Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: 🧹 Clean build
      run: ./gradlew clean
    
    - name: 🔨 Build Debug APK
      run: ./gradlew assembleDebug
    
    - name: 📦 Build Release APK
      run: ./gradlew assembleRelease
    
    - name: 📤 Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: JowoTerm-Debug
        path: app/build/outputs/apk/debug/*.apk
    
    - name: 📤 Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: JowoTerm-Release
        path: app/build/outputs/apk/release/*.apk
    
    - name: 📤 Upload Mapping File
      uses: actions/upload-artifact@v4
      with:
        name: mapping-file
        path: app/build/outputs/mapping/release/mapping.txt
    
    - name: 📊 Upload Build Report
      uses: actions/upload-artifact@v4
      with:
        name: build-report
        path: app/build/reports/
    
    - name: 🏷️ Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: JowoTerm v1.0.${{ github.run_number }}
        body: |
          ## 🚀 JowoTerm - Terminal Jowo untuk Android
          
          ### Fitur:
          - ✅ Multi session terminal
          - ✅ Run kode Jowo langsung
          - ✅ Dark theme (hijau di hitam)
          - ✅ Variabel dan operasi matematika
          - ✅ Help command bawaan
          
          ### Cara Install:
          1. Download APK dari attachments
          2. Install di Android (izin install dari sumber tidak dikenal)
          3. Buka aplikasi dan mulai coding Jowo!
          
          ### Perintah:
          - `cetak("teks")` - Cetak teks
          - `x = 10` - Assign variabel
          - `cetak(x)` - Cetak variabel
          - `clear` - Bersihkan layar
          - `vars` - Lihat semua variabel
          - `help` - Bantuan
          
        files: |
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 📝 Upload to Release (Debug)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        files: app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}